name: Release Sortd

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o sortd-linux-amd64 ./cmd/sortd/...
          GOOS=linux GOARCH=arm64 go build -o sortd-linux-arm64 ./cmd/sortd/...

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            sortd-linux-amd64 \
            sortd-linux-arm64 \
            --title "sortd ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
